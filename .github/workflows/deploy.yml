name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main # או master, האוטומציה תרוץ בכל פעם שתעדכן את הקוד

# מעניק הרשאות מתאימות ל-GitHub Actions להעלות את האתר
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          # הסרנו את ה-cache כדי שלא יחפש קבצי נעילה חסרים

      - name: Install dependencies
        run: npm install # שינוי ל-install רגיל כדי שלא ייכשל בלי קובץ lock

      - name: Build
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
